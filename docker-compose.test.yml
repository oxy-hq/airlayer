version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: airlayer_test
      POSTGRES_USER: airlayer
      POSTGRES_PASSWORD: airlayertest
    ports:
      - "15432:5432"
    volumes:
      - ./tests/integration/seed/postgres.sql:/docker-entrypoint-initdb.d/01_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airlayer"]
      interval: 2s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: airlayer_test
      MYSQL_USER: airlayer
      MYSQL_PASSWORD: airlayertest
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "13306:3306"
    volumes:
      - ./tests/integration/seed/mysql.sql:/docker-entrypoint-initdb.d/01_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 2s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "18123:8123"
      - "19000:9000"
    volumes:
      - ./tests/integration/seed/clickhouse.sql:/docker-entrypoint-initdb.d/01_seed.sql
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 2s
      timeout: 5s
      retries: 10
