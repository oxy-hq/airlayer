name: npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build WASM package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install wasm-opt (binaryen)
        run: |
          BINARYEN_VERSION=version_120
          curl -sL https://github.com/WebAssembly/binaryen/releases/download/${BINARYEN_VERSION}/binaryen-${BINARYEN_VERSION}-x86_64-linux.tar.gz | tar xz
          echo "$PWD/binaryen-${BINARYEN_VERSION}/bin" >> $GITHUB_PATH

      - name: Build WASM
        run: |
          wasm-pack build --target web -- --no-default-features --features wasm
          wasm-opt -Oz --enable-bulk-memory --enable-nontrapping-float-to-int --enable-sign-ext pkg/airlayer_bg.wasm -o pkg/airlayer_bg.wasm.opt
          mv pkg/airlayer_bg.wasm.opt pkg/airlayer_bg.wasm

      - name: Patch package.json (version + repository)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          cd pkg
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          node -e "
            const pkg = require('./package.json');
            pkg.repository = { type: 'git', url: 'https://github.com/oxy-hq/airlayer' };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - uses: actions/upload-artifact@v5
        with:
          name: wasm-pkg
          path: pkg

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: npm
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: wasm-pkg
          path: pkg

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: cd pkg && npm publish --access public --provenance
