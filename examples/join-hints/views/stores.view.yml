name: stores
description: "Store fulfillment"
table: stores

entities:
  - name: store_order
    type: primary
    key: order_id
  - name: shipment
    type: foreign
    key: shipment_id

dimensions:
  - name: order_id
    type: number
    expr: order_id
  - name: store_name
    type: string
    expr: name
  - name: shipment_id
    type: number
    expr: shipment_id
