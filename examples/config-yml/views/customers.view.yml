name: customers
description: "Customer data — uses datasource for Oxy interop"
table: public.customers
datasource: warehouse

entities:
  - name: customer
    type: primary
    key: customer_id

dimensions:
  - name: customer_id
    type: number
    expr: id
  - name: name
    type: string
    expr: name
  - name: email
    type: string
    expr: email

measures:
  - name: customer_count
    type: count
