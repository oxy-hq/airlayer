name: revenue
description: "SaaS revenue metrics — composite measures form the metric tree"
dialect: postgres
table: subscriptions

dimensions:
  - name: plan
    type: string
    expr: plan_name
  - name: region
    type: string
    expr: region
  - name: created_at
    type: datetime
    expr: created_at

measures:
  # Leaf (atomic) measures
  - name: total_customers
    type: count_distinct
    expr: customer_id

  - name: total_mrr
    type: sum
    expr: mrr

  - name: churned_customers
    type: count_distinct
    expr: customer_id
    filters:
      - expr: "status = 'churned'"

  - name: churned_mrr
    type: sum
    expr: mrr
    filters:
      - expr: "status = 'churned'"

  - name: expansion_mrr
    type: sum
    expr: expansion_amount

  - name: new_mrr
    type: sum
    expr: new_amount

  # Composite measures (implicit component edges via {{refs}})
  - name: arpu
    type: number
    expr: "{{revenue.total_mrr}} / NULLIF({{revenue.total_customers}}, 0)"

  - name: churn_rate
    type: number
    expr: "CAST({{revenue.churned_customers}} AS FLOAT) / NULLIF({{revenue.total_customers}}, 0)"

  - name: net_mrr
    type: number
    expr: "{{revenue.total_mrr}} + {{revenue.expansion_mrr}} + {{revenue.new_mrr}} - {{revenue.churned_mrr}}"

  - name: net_revenue_retention
    type: number
    expr: "({{revenue.total_mrr}} + {{revenue.expansion_mrr}} - {{revenue.churned_mrr}}) / NULLIF({{revenue.total_mrr}}, 0)"

  # Top-level KPI with explicit driver annotations
  # Drivers can be qualitative (direction/strength) or quantitative (coefficient/form)
  - name: arr
    type: number
    expr: "{{revenue.net_mrr}} * 12"
    drivers:
      # Quantitative driver: each 1% increase in churn reduces ARR by ~$120K
      - measure: revenue.churn_rate
        coefficient: -120000.0
        form: linear
        lag: 30
        description: "Higher churn directly reduces ARR"
        refs:
          - "https://www.example.com/churn-analysis-q1"
      # Quantitative driver: ARPU has log-log relationship (elasticity ~0.6)
      - measure: revenue.arpu
        coefficient: 0.6
        form: log-log
        description: "ARPU expansion drives ARR growth"
      # Qualitative driver (no coefficient — domain knowledge only)
      - measure: marketing.leads
        direction: positive
        strength: moderate
        confidence: low
        description: "Top-of-funnel volume feeds eventual revenue"
