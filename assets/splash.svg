<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 260" fill="none">
  <!-- Background -->
  <rect width="960" height="260" fill="#0a0a0a"/>

  <!-- Subtle horizontal dividers -->
  <line x1="0" y1="0" x2="960" y2="0" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="0" y1="259" x2="960" y2="259" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

  <!-- .view.yml box (left) -->
  <rect x="100" y="88" width="180" height="84" rx="2" fill="transparent" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="112" y="78" font-family="'Space Mono', ui-monospace, monospace" font-size="9" fill="#ffffff" opacity="0.35" letter-spacing="1.5">.VIEW.YML</text>
  <text x="118" y="112" font-family="'Space Mono', ui-monospace, monospace" font-size="10" fill="#ffffff" opacity="0.6">name: orders</text>
  <text x="118" y="126" font-family="'Space Mono', ui-monospace, monospace" font-size="10" fill="#ffffff" opacity="0.35">measures:</text>
  <text x="118" y="140" font-family="'Space Mono', ui-monospace, monospace" font-size="10" fill="#ffffff" opacity="0.35">  - total_revenue</text>
  <text x="118" y="154" font-family="'Space Mono', ui-monospace, monospace" font-size="10" fill="#ffffff" opacity="0.35">dimensions:</text>

  <!-- Arrow (left) -->
  <line x1="300" y1="130" x2="368" y2="130" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
  <polygon points="368,127 374,130 368,133" fill="#ffffff" fill-opacity="0.2"/>

  <!-- airlayer (center) -->
  <text x="480" y="122" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-1">airlayer</text>
  <text x="480" y="148" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" letter-spacing="6" opacity="0.35">SEMANTIC ENGINE</text>

  <!-- Arrow (right) -->
  <line x1="592" y1="130" x2="660" y2="130" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
  <polygon points="660,127 666,130 660,133" fill="#ffffff" fill-opacity="0.2"/>

  <!-- SQL output box (right) -->
  <rect x="680" y="88" width="180" height="84" rx="2" fill="transparent" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
  <text x="692" y="78" font-family="'Space Mono', ui-monospace, monospace" font-size="9" fill="#ffffff" opacity="0.35" letter-spacing="1.5">SQL</text>
  <text x="698" y="112" font-family="'Space Mono', ui-monospace, monospace" font-size="10" fill="#ffffff" opacity="0.6">SELECT</text>
  <text x="698" y="126" font-family="'Space Mono', ui-monospace, monospace" font-size="10" fill="#ffffff" opacity="0.35">  SUM(amount)</text>
  <text x="698" y="140" font-family="'Space Mono', ui-monospace, monospace" font-size="10" fill="#ffffff" opacity="0.35">FROM orders</text>
  <text x="698" y="154" font-family="'Space Mono', ui-monospace, monospace" font-size="10" fill="#ffffff" opacity="0.35">GROUP BY 1</text>

  <!-- Subtle center divider line -->
  <line x1="380" y1="165" x2="580" y2="165" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

</svg>
